<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Bancario - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-[#1e293b] p-8 rounded-2xl border border-slate-700 shadow-2xl">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-cyan-500/10 text-cyan-400 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border border-cyan-500/30">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-100 tracking-tight">Sistema Transaccional GT</h1>
            <p class="text-slate-400 text-sm mt-1">Autenticación de Usuarios del Core Bancario</p>
        </div>

        <form class="space-y-6" id="loginForm">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Usuario del Sistema</label>
                <div class="relative">
                    <span class="absolute left-4 top-3 text-slate-500">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="usuario" placeholder="Ej. Admin_Core" required
                        class="w-full bg-[#0f172a] border border-slate-700 rounded-lg pl-11 pr-4 py-2.5 text-slate-200 focus:outline-none focus:border-cyan-500 transition">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-xs font-semibold uppercase tracking-wider text-slate-400">Contraseña de Acceso</label>
                </div>
                <div class="relative">
                    <span class="absolute left-4 top-3 text-slate-500">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full bg-[#0f172a] border border-slate-700 rounded-lg pl-11 pr-4 py-2.5 text-slate-200 focus:outline-none focus:border-cyan-500 transition">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-3 rounded-lg shadow-lg shadow-cyan-500/10 transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión Auditada
            </button>
        </form>

        <div class="mt-6 border-t border-slate-700/60 pt-4 text-center">
            <p class="text-xs text-slate-500 flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-key text-[10px]"></i> Conexión encriptada con Roles y Permisos (ER)
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que recargue la página de golpe
            
            // Simulación rápida: Si llena los datos, lo deja pasar al index.html
            // En el backend real, aquí es donde comparamos contra la tabla UsuariosSistema
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
